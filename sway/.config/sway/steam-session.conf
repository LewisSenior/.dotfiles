# ~/.config/sway/steam-session.conf
# Minimal Sway session: boots straight into Steam in Deck / gamepad UI,
# fullscreen, nothing else. Launched as the "Steam" session from the TUI login.

# Start Steam in its normal desktop UI. When Steam quits, exit Sway (back to the login).
# (Temporary diagnostics: capture display/XWayland state right before Steam runs.)
exec sh -c '{ echo "WAYLAND_DISPLAY=$WAYLAND_DISPLAY DISPLAY=$DISPLAY XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR"; echo "--- gpu env ---"; env | grep -Ei "GBM|GLX|VENDOR|NVIDIA|WLR" | sort; echo "--- X11 sockets ---"; ls -la /tmp/.X11-unix/ 2>&1; echo "--- glxinfo probe (triggers lazy XWayland + tests NVIDIA GLX) ---"; glxinfo -B 2>&1 || echo "glxinfo failed rc=$?"; echo "--- Xwayland procs ---"; pgrep -a Xwayland 2>&1 || echo "no Xwayland running"; } > ~/steam-session-diag.txt 2>&1; steam; swaymsg exit'

# Let windows that request activation take focus (e.g. games Steam launches),
# instead of Sway's default "smart" behaviour which can leave them in the background.
focus_on_window_activation focus

# Couch-friendly: hide the pointer after 5s idle.
seat * hide_cursor 5000

# Manually switch focus between windows (e.g. Steam <-> a launched game).
# Both are fullscreen, so focusing the other one brings it to the front.
bindsym Alt+Tab focus next
bindsym Mod4+Tab focus next
bindsym Mod4+Shift+Tab focus prev
# Directional focus as a fallback if next/prev doesn't land where you expect.
bindsym Mod4+Left focus left
bindsym Mod4+Right focus right
# Toggle fullscreen on the focused window, in case a game opens windowed/behind.
bindsym Mod4+f fullscreen toggle

# Escape hatches if you ever need to drop out.
bindsym Mod4+Shift+q exit
bindsym Ctrl+Alt+Backspace exit

# Rootless podman storage for the desktop-container build/run.
# Force overlay via fuse-overlayfs: without this, podman falls back to the
# vfs driver, which copies the whole rootfs per layer and fails to commit
# the large desktop image. graphroot is left at its default
# ($HOME/.local/share/containers/storage) so this is host-agnostic.
[storage]
driver = "overlay"

[storage.options.overlay]
mount_program = "/usr/bin/fuse-overlayfs"

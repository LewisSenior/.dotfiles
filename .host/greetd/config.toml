# greetd config — installed to /etc/greetd/config.toml by pre-req.sh
# (which also fixes the greeter user to whatever the Debian package created).
[terminal]
# Debian's greetd.service reserves tty7 (Conflicts=getty@tty7.service). Using
# vt = 1 collides with getty@tty1 — the getty keeps tty1, greetd can't take it,
# and tuigreet dies. tty7 is free and is what the packaged unit expects.
vt = 7

[default_session]
# tuigreet reads a dedicated session dir so the menu shows EXACTLY two entries
# — the containerized desktop and host-native sway (installed to
# /etc/greetd/sessions by pre-req.sh). --xsessions points at an empty dir to
# suppress /usr/share/xsessions (i3, plasma, ...); without it tuigreet also
# lists all X sessions. Absolute path pins the fixed tuigreet in
# /usr/local/bin — the packaged tuigreet (0.7.3/0.8.0) panics 'invalid key'
# (termion bug); build the current one: cargo install tuigreet && sudo install
# -m755 ~/.cargo/bin/tuigreet /usr/local/bin/tuigreet
# Fallback greeter if tuigreet ever breaks:
# command = "agreety --cmd /usr/local/bin/sway-container-session"
command = "/usr/local/bin/tuigreet --time --remember --remember-session --sessions /etc/greetd/sessions --xsessions /etc/greetd/xsessions"
user = "_greetd"

set -g default-terminal 'xterm-256color'
set -g default-shell /bin/zsh
set -g base-index 1
set -ga terminal-overrides ',alacritty:RGB:smcup@:rmcup@'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g status-left-length 80
set -g status-left '#(tmux-session-status)'
set -s escape-time 0
set -g automatic-rename off
set -g allow-rename on
set-hook -g after-new-window 'run-shell "tmux-window-name"'
set -g mouse on
set -g status-interval 1

bind r source-file ~/.tmux.conf
bind -n MouseDown1StatusLeft choose-tree -Zs

bind -r n new-window
bind % split-window -h
bind '"' split-window -v

# vim-like pane switching
bind -r h last-window
bind -r l next-window

unbind x
unbind w
bind-key x run-shell 'tmux-kill-default-windows'
bind-key w display-popup -E "tmux-session-switcher"
unbind f
bind-key f display-popup -E "tmux-sessionizer"
bind-key C-f display-popup -E "tmux-sessionizer"
unbind t
bind-key t display-popup -E "tmux-sessionizer ~/tmp"
bind-key H display-popup -E "tmux-sessionizer ~/"
bind-key C-w display-popup -E "tmux-session-switcher"

# network tools
bind-key m command-prompt -p "mtr:" "display-popup -E -w 80% -h 80% 'tmux-popup-persist mtr %%'"
bind-key p command-prompt -p "ping:" "display-popup -E -w 80% -h 80% 'tmux-popup-persist ping %%'"
